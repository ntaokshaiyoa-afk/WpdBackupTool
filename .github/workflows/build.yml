name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Setup MSBuild (Visual Studio)
      uses: microsoft/setup-msbuild@v2

    # ソース取得
    - name: Checkout
      uses: actions/checkout@v4

    # NuGetキャッシュ（高速化）
    - name: Cache NuGet
      uses: actions/cache@v4
      with:
        path: |
          ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore
      run: nuget restore WpdDemo.sln

    - name: Build
      run: msbuild WpdDemo.sln /p:Configuration=Release /p:Platform=AnyCPU /m

    # 発行（単一EXE）
    - name: Copy Output
      run: |
        mkdir publish
        xcopy WpdDemo\bin\Release\* publish\ /E /H /C /I

    # 成果物アップロード
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WpdDemo
        path: publish/
