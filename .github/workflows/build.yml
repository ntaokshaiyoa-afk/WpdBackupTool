name: Build WPF App

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # .NET（restore用）
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # MSBuild（COM対応）
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # ★ これが重要（assets生成）
    - name: Restore
      run: dotnet restore

    # ★ COM対応ビルド
    - name: Build
      run: msbuild WpdBackupTool.csproj /p:Configuration=Release

    - name: Publish
      run: msbuild WpdBackupTool.csproj ^
            /p:Configuration=Release ^
            /p:PublishDir=publish ^
            /p:RuntimeIdentifier=win-x64 ^
            /p:PublishSingleFile=true

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WpdBackupTool
        path: publish/
