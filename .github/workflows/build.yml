name: Build WPF App

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # Visual StudioのMSBuildを使う
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore
      run: nuget restore

    - name: Build (MSBuild)
      run: msbuild WpdBackupTool.csproj /p:Configuration=Release

    - name: Publish
      run: msbuild WpdBackupTool.csproj /p:Configuration=Release /p:PublishDir=publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WpdBackupTool
        path: publish/
